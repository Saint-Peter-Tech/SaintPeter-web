<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SPT | Cadastro de monitores</title>

    <script src="./js/sessao.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/LogoClara.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
    <div>
        <p><span>Selecione o hospital desejado:</span>
            <select name="select_hospital" id="select_hospital" onchange="listarUnidades()">
                <option value="0" selected disabled>Selecione um hospital</option>
            </select>
        </p>

        <div id="container_unidade" style="display: none;" onchange="listarComponentes()">
            <p><span>Selecione a Unidade:</span>
                <select id="select_unidade">
                    <option value="0" selected disabled>Selecione uma unidade</option>
                </select>
            </p>
        </div>

        <div id="container_componentes" style="display: none;">
            <p>Selecione os componentes a serem monitorados nesse monitor:</p>

            <div>
                <input type="checkbox" id="check_cpu" onchange="verificarCheckboxes()">
                <span>Processador (CPU)</span>
                <div id="div_limite_cpu" style="display: none;">
                    <span>Limite máximo para alerta (%):</span>
                    <input type="number" id="input_limite_cpu">
                </div>
            </div>

            <div>
                <input type="checkbox" id="check_ram" onchange="verificarCheckboxes()">
                <span>Memória RAM</span>
                <div id="div_limite_ram" style="display: none;">
                    <span>Limite máximo para alerta (%):</span>
                    <input type="number" id="input_limite_ram">
                </div>
            </div>

            <div>
                <input type="checkbox" id="check_disco" onchange="verificarCheckboxes()">
                <span>Disco</span>
                <div id="div_limite_disco" style="display: none;">
                    <span>Limite máximo para alerta (%):</span>
                    <input type="number" id="input_limite_disco">
                </div>
            </div>

            <div>
                <input type="checkbox" id="check_rede" onchange="verificarCheckboxes()">
                <span>Rede</span>
                <div id="div_limite_rede" style="display: none;">
                    <span>Velocidade de upload e download (Mbps):</span>
                    <input type="number" id="input_limite_rede">
                </div>
            </div>

            <br>
            <button onclick="cadastrarMonitor()">Cadastrar Monitor</button>
        </div>

        <div id="div_erroCadastro"></div>

    </div>
</body>
<script>
    window.onload = listarHospitais

    function listarHospitais() {
        var idEmpresa = sessionStorage.FK_EMPRESA
        fetch(`/hospital/buscarHospitais?idEmpresa=${idEmpresa}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (hospitais) {

                const select = document.getElementById("select_hospital");

                hospitais.forEach(hospital => {
                    const option = document.createElement("option");

                    option.value = hospital.id_hospital;
                    option.textContent = hospital.nome_hospital;

                    select.appendChild(option);
                });

            })
            .catch(function (erro) {
                console.error("Erro ao buscar hospitais:", erro);
            });
    }

    function listarUnidades() {
        var idHospital = select_hospital.value;
        var container = document.getElementById("container_unidade");
        var selectUnidade = document.getElementById("select_unidade");

        if (idHospital == "0") {
            container.style.display = "none";
            return;
        }

        fetch(`/unidade/listarPorHospital?idHospital=${idHospital}`)
            .then(function (resposta) {
                if (resposta.ok) {
                    return resposta.json();
                }
            })
            .then(function (unidades) {
                selectUnidade.innerHTML = '<option value="0" selected disabled>Selecione uma unidade</option>';

                unidades.forEach(unidade => {
                    const option = document.createElement("option");
                    option.value = unidade.id_unidade;
                    option.textContent = unidade.nome_unidade;
                    selectUnidade.appendChild(option);
                });
                container.style.display = "block";
                container_componentes.style.display = "none";
            })
            .catch(function (erro) {
                console.error("Erro ao buscar unidades:", erro);
            });
    }

    function listarComponentes() {
        if (select_unidade.value != 0) {
            container_componentes.style.display = "block"
        } else {
            container_componentes.style.display = "none"
        }
    }

    function verificarCheckboxes() {

        if (check_cpu.checked) {
            div_limite_cpu.style.display = "block"
        } else {
            div_limite_cpu.style.display = "none"
        }

        if (check_ram.checked) {
            div_limite_ram.style.display = "block"
        } else {
            div_limite_ram.style.display = "none"
        }

        if (check_disco.checked) {
            div_limite_disco.style.display = "block"
        } else {
            div_limite_disco.style.display = "none"
        }

        if (check_rede.checked) {
            div_limite_rede.style.display = "block"
        } else {
            div_limite_rede.style.display = "none"
        }
    }

    function cadastrarMonitor() {
        var idUnidade = select_unidade.value;
        var idEmpresa = sessionStorage.FK_EMPRESA;
        var statusMonitor = "Ativo";
        var listaComponentes = [];
        var mensagemErro = "";
        var limiteCPU = input_limite_cpu.value;
        var limiteRAM = input_limite_ram.value;
        var limiteDisco = input_limite_disco.value;
        var limiteRede = input_limite_rede.value;
        div_erroCadastro.innerHTML = "";


        if (check_cpu.checked) {
            if (limiteCPU == "" || limiteCPU <= 0 || limiteCPU > 100) {
                mensagemErro += "O limite da <b>CPU</b> não pode estar vazio, ou menor que 0 e nem maior que 100%.<br>";
            } else {
                listaComponentes.push({
                    id: 1,
                    limite: document.getElementById("input_limite_cpu").value
                });
            }

        }
        if (check_ram.checked) {
            if (limiteRAM == "" || limiteRAM <= 0 || limiteRAM > 100) {
                mensagemErro += "O limite da <b>RAM</b> não pode estar vazio, ou menor que 0 e nem maior que 100%.<br>";
            } else {
                listaComponentes.push({
                    id: 2,
                    limite: document.getElementById("input_limite_ram").value
                });
            }
        }

        if (check_disco.checked) {
            if(limiteDisco == "" || limiteDisco <= 0 || limiteDisco > 100){
                mensagemErro += "O limite do <b>disco</b> não pode estar vazio, ou menor que 0 e nem maior que 100%.<br>";
            }else{
                listaComponentes.push({
                id: 3,
                limite: document.getElementById("input_limite_disco").value
            });
            }
        }

        if (check_rede.checked) {
            if(limiteRede <= 0 || limiteRede == null){
                mensagemErro += "O limite da <b>rede</b> não pode estar vazio, ou menor que 0Mbps.<br>";
            }
            listaComponentes.push({
                id: 4,
                limite: document.getElementById("input_limite_rede").value
            });
        }


        if (listaComponentes.length == 0) {
            mensagemErro += "Selecione ao menos um componente para monitorar.<br>";
        }

        if (mensagemErro != "") {
            div_erroCadastro.style.color = "red";
            div_erroCadastro.innerHTML = mensagemErro;
            return;
        }

        fetch("/monitor/cadastrarMonitor", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                unidadeServer: idUnidade,
                empresaServer: idEmpresa,
                statusServer: statusMonitor,
                componentesServer: listaComponentes
            })
        }).then(function (resposta) {
            if (resposta.ok) {
                console.log("Monitor cadastrado com sucesso!");
                div_erroCadastro.style.color = "green"
                div_erroCadastro.innerHTML = "Monitor cadastrado com sucesso!"
            } else {
                console.log("Monitor cadastrado com sucesso!");
                div_erroCadastro.style.color = "red"
                div_erroCadastro.innerHTML = "Erro ao realizar o cadastro de monitor, tente novamente"
            }
        }).catch(function (erro) {
            console.log(`#ERRO: ${erro}`);
        });

        /*
        AVISO PARA OS COLEGAS DE GRUPO:
        O JSON FICARÁ ASSIM: 
        CADA MONITOR COM SUA CHAVE-VALOR
        
        {
      "unidadeServer": "2",
      "empresaServer": "1",
      "statusServer": "Ativo",
      "componentesServer": [
        {
          "id": 1,
          "limite": "80"
        },
        {
          "id": 2,
          "limite": "70"
        }
      ]
    }*/
    }

</script>
</html>
