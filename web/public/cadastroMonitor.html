<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SPT | Cadastro de monitores</title>

    <script src="./js/sessao.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/LogoClara.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
    <div>
        <p><span>Selecione o hospital desejado:</span>
            <select name="select_hospital" id="select_hospital" onchange="listarUnidades()">
                <option value="0" selected disabled>Selecione um hospital</option>
            </select>
        </p>

        <div id="container_unidade" style="display: none;">
            <p><span>Selecione a Unidade:</span>
                <select id="select_unidade">
                    <option value="0" selected disabled>Selecione uma unidade</option>
                </select>
            </p>
        </div>
        <div id="div_erroCadastro"></div>
    </div>
</body>
<script>
    window.onload = listarHospitais

  function listarHospitais() {
    var idEmpresa = sessionStorage.FK_EMPRESA
    fetch(`/hospital/buscarHospitais?idEmpresa=${idEmpresa}`)
      .then(function (resposta) {
        return resposta.json();
      })
      .then(function (hospitais) {

        const select = document.getElementById("select_hospital");

        hospitais.forEach(hospital => {
          const option = document.createElement("option");

          option.value = hospital.id_hospital;
          option.textContent = hospital.nome_hospital;

          select.appendChild(option);
        });

      })
      .catch(function (erro) {
        console.error("Erro ao buscar hospitais:", erro);
      });
  }

  function listarUnidades() {
  var idHospital = select_hospital.value;
  var container = document.getElementById("container_unidade");
  var selectUnidade = document.getElementById("select_unidade");

  if (idHospital == "0") {
    container.style.display = "none";
    return;
  }

  fetch(`/unidade/listarPorHospital?idHospital=${idHospital}`)
    .then(function (resposta) {
      if (resposta.ok) {
        return resposta.json();
      }
    })
    .then(function (unidades) {
      selectUnidade.innerHTML = '<option value="0" selected disabled>Selecione uma unidade</option>';

      unidades.forEach(unidade => {
        const option = document.createElement("option");
        option.value = unidade.id_unidade;
        option.textContent = unidade.nome_unidade;
        selectUnidade.appendChild(option);
      });
      container.style.display = "block";
    })
    .catch(function (erro) {
      console.error("Erro ao buscar unidades:", erro);
    });
}
</script>
</html>
