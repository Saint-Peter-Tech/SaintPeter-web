<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>SPT | Cadastro de Unidades</title>

  <script src="./js/sessao.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

</head>
<body>
    <div>
        <p><span>Selecione o hospital desejado:</span>
        <select name="select_hospital" id="select_hospital">
            <option value="0" selected disabled>Selecione um hospital</option>
        </select>
        </p>

        <p><span>CEP:</span>
        <input type="text" id="input_cep" maxlength="8">
        </p>

        <p><span>Rua:</span>
        <input type="text" id="input_rua" maxlength="50">
        </p>

        <p><span>Número:</span>
        <input type="text" id="input_numero" maxlength="50">
        </p>

        <p><span>Cidade:</span>
        <input type="text" id="input_cidade" maxlength="50">
        </p>

        <p><span>Email do Responsável:</span>
        <input type="text" id="input_emailResponsavel" maxlength="50">
        </p>

        <p><span>Telefone do Responsável:</span>
        <input type="text" id="input_telefoneResponsavel" maxlength="11">
        </p>

        <p>
          <button onclick="cadastrarUnidade()">Cadastrar Unidade</button>
        </p>
    </div>
</body>

<script>
window.onload = listarHospitais

function listarHospitais() {
  
  fetch("/hospital/buscarHospitais")
    .then(function (resposta) {
      return resposta.json();
    })
    .then(function (hospitais) {

      const select = document.getElementById("select_hospital");

      hospitais.forEach(hospital => {
        const option = document.createElement("option");

        option.value = hospital.id_hospital;
        option.textContent = hospital.nome_hospital;

        select.appendChild(option);
      });

    })
    .catch(function (erro) {
      console.error("Erro ao buscar hospitais:", erro);
    });
}



  function cadastrarUnidade(){
  var listaHospitais = select_hospital.value;
  var cep = input_cep.value;
  var rua = input_rua.value;
  var numero = input_numero.value;
  var cidade = input_cidade.value;
  var emailResponsavel = input_emailResponsavel.value;
  var telefoneResponsavel = input_telefoneResponsavel.value;
  }
</script>
</html>
