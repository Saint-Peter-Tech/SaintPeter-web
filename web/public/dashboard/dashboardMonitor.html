<script>
  //b_usuario.innerHTML = "Fernando";

  const dias = [
    "Seg", "Ter", "Qua", "Qui", "Sex", "Sab", "Dom"
  ];

  const consumoCPU = [35, 48, 52, 60, 72, 55, 40];
  const consumoRAM = [45, 50, 58, 63, 70, 62, 48];

  document.getElementById("kpi_media_ram").innerText = "65%";
  document.getElementById("kpi_mais").innerText = "Sexta";
  document.getElementById("kpi_menos").innerText = "Segunda";

  const ctx = document.getElementById('lineChart');

  const configCPU = {
    type: 'line',
    data: {
      labels: dias,
      datasets: [{
        label: 'Consumo médio de CPU (%)',
        data: consumoCPU,
        borderColor: '#1c52c8',
        backgroundColor: '#08a4bd33',
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100
        }
      }
    }
  };

  new Chart(ctx, configCPU);


  const ctxBar = document.getElementById('barChart');

  const configRAM = {
    type: 'bar',
    data: {
      labels: dias,
      datasets: [{
        label: 'Consumo médio de RAM (%)',
        data: consumoRAM,
        backgroundColor: '#1c52c8'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100
        }
      }
    }
  };

  new Chart(ctxBar, configRAM);


  function alertaPopUp() {
    if (Number(consumoCPU[4]) >= 70) {
      var mensagem = `Consumo de CPU elevado na Sexta-feira`;

      alerta_popup.style.display = 'flex';
      mensagem_alerta.innerHTML = mensagem;
    }
  }

  function escondeAlerta() {
    alerta_popup.style.display = 'none';
  }

  alertaPopUp();
